{% extends "base.html" %}

{% block title %}Add Hostel - College ERP{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Add New Hostel</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('hostel.add_hostel') }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Hostel Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="type" class="form-label">Type</label>
                            <select class="form-select" id="type" name="type" required>
                                <option value="Boys">Boys</option>
                                <option value="Girls">Girls</option>
                                <option value="Co-ed">Co-ed</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="total_rooms" class="form-label">Total Rooms</label>
                            <input type="number" class="form-control" id="total_rooms" name="total_rooms" min="1"
                                required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="capacity_per_room" class="form-label">Capacity Per Room</label>
                            <input type="number" class="form-control" id="capacity_per_room" name="capacity_per_room"
                                min="1" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <textarea class="form-control" id="address" name="address" rows="3"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" name="phone">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('hostel.hostel') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Add Hostel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
