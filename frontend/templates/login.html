{% extends "base.html" %}

{% block title %}Authentication - College ERP{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card glass border-0 p-5 shadow-lg">
        <div class="mb-5">
            <div class="widget-icon mx-auto mb-4 hover-scale" style="width: 80px; height: 80px; font-size: 2.2rem; background: rgba(99, 102, 241, 0.1); color: var(--accent-primary);">
                <i class="fas fa-fingerprint"></i>
            </div>
            <h2 class="fw-bold mb-2">Secure Access</h2>
            <p class="text-muted small">Initialize session to access the central ERP relay</p>
        </div>

        <form id="loginForm" method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group mb-4">
                <label for="email" class="form-label ps-1">Relay Identity (Email)</label>
                <div class="position-relative">
                    <i class="fas fa-at position-absolute top-50 start-0 translate-middle-y ms-3 text-muted opacity-50"></i>
                    <input type="email" class="form-control form-input ps-5" id="email" name="email" 
                           placeholder="admin@educloud.com" required>
                </div>
            </div>

            <div class="form-group mb-5">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label for="password" class="form-label ps-1 mb-0">Encryption Key</label>
                    <a href="#" class="small text-accent-primary text-decoration-none fw-semibold">Recover?</a>
                </div>
                <div class="position-relative">
                    <i class="fas fa-key position-absolute top-50 start-0 translate-middle-y ms-3 text-muted opacity-50"></i>
                    <input type="password" class="form-control form-input ps-5" id="password" name="password" 
                           placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-premium w-100 mb-4 py-3" id="loginBtn" style="font-size: 1rem; letter-spacing: 2px;">
                <i class="fas fa-unlock-alt me-2"></i> AUTHORIZE
            </button>

            <div id="msg" class="mb-4"></div>

            <div class="text-center pt-4 border-top border-white-5">
                <p class="mb-1 text-muted small">New Operator?</p>
                <a href="{{ url_for('auth.register') }}" class="btn btn-link text-accent-primary fw-700 text-decoration-none">
                    PROVISION NEW ACCOUNT
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    .auth-wrapper {
        background: radial-gradient(circle at center, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
    }
    .form-input {
        background: rgba(255, 255, 255, 0.02) !important;
        border-color: rgba(255, 255, 255, 0.05) !important;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('msg');
    const originalContent = btn.innerHTML;
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span> CRYPTO-VERIFYING...';
    msg.innerHTML = '';
    
    const form = e.target;
    const data = new FormData(form);
    
    try {
        const res = await fetch(form.action, {
            method: 'POST',
            body: data,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        
        const result = await res.json();
        
        if (result.success) {
            window.location = result.redirect;
        } else {
            msg.innerHTML = `<div class="toast glass toast-error show w-100 justify-content-center p-3">
                <i class="fas fa-shield-xmark me-2"></i>
                <small class="fw-bold">${result.message || 'Access Denied: Invalid Credentials'}</small>
            </div>`;
        }
    } catch(err) {
        msg.innerHTML = `<div class="toast glass toast-error show w-100 justify-content-center p-3">
            <i class="fas fa-network-wired me-2"></i>
            <small class="fw-bold">Signal Error: Connection Refused</small>
        </div>`;
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalContent;
    }
});
</script>
{% endblock %}
