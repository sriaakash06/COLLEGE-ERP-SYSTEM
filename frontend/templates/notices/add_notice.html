{% extends "base.html" %}

{% block title %}Post Announcement - College ERP{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="glass card border-0 shadow-lg overflow-hidden">
                <div class="card-header bg-transparent border-white-5 p-4 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <div class="widget-icon me-3 bg-accent-soft text-accent-primary">
                            <i class="fas fa-bullhorn"></i>
                        </div>
                        <div>
                            <h4 class="mb-0 fw-bold">Broadcast Hub</h4>
                            <p class="text-muted small mb-0 font-monospace">SYSTEM.INJECT_COMMUNICATION</p>
                        </div>
                    </div>
                    <a href="{{ url_for('notices.notices') }}" class="btn btn-outline-light btn-sm border-white-10 px-3">
                        <i class="fas fa-arrow-left me-2"></i> ABORT
                    </a>
                </div>

                <div class="card-body p-5">
                    <form action="{{ url_for('notices.add_notice') }}" method="POST">
                        <div class="row g-4">
                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label text-muted small fw-bold text-uppercase mb-2">Subject Header</label>
                                    <input type="text" name="title" class="form-control form-input py-3" 
                                           placeholder="e.g. SEMESTER EXAMINATION SCHEDULE RELEASE" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label text-muted small fw-bold text-uppercase mb-2">Transmission Type</label>
                                    <select name="type" class="form-control form-input" required>
                                        <option value="Academic">ACADEMIC</option>
                                        <option value="Event">EVENT</option>
                                        <option value="Administrative">ADMINISTRATIVE</option>
                                        <option value="Emergency">EMERGENCY</option>
                                        <option value="Holiday">HOLIDAY</option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label text-muted small fw-bold text-uppercase mb-2">Priority Level</label>
                                    <select name="priority" class="form-control form-input" required>
                                        <option value="Low">LOW SIGNAL</option>
                                        <option value="Medium" selected>STANDARD</option>
                                        <option value="High">HIGH PRIORITY</option>
                                        <option value="Critical">CRITICAL / URGENT</option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label text-muted small fw-bold text-uppercase mb-2">Target Demographic</label>
                                    <select name="target_audience" class="form-control form-input" required>
                                        <option value="All">GLOBAL (EVERYONE)</option>
                                        <option value="Students">STUDENT BASE</option>
                                        <option value="Staff">FACULTY & STAFF</option>
                                        <option value="Parents">PARENT / GUARDIAN</option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label text-muted small fw-bold text-uppercase mb-2">Termination Date (Expiry)</label>
                                    <input type="date" name="expiry_date" class="form-control form-input">
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-group">
                                    <label class="form-label text-muted small fw-bold text-uppercase mb-2">Transmission Payload (Content)</label>
                                    <textarea name="content" class="form-control form-input" rows="6" 
                                              placeholder="Detailed announcement details..." required></textarea>
                                </div>
                            </div>

                            <div class="col-12 border-top border-white-5 pt-4 mt-5">
                                <button type="submit" class="btn-premium w-100 py-3">
                                    <i class="fas fa-satellite-dish me-2 pulse"></i> INITIALIZE GLOBAL BROADCAST
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-input {
        background: rgba(255, 255, 255, 0.02) !important;
        border: 1px solid rgba(255, 255, 255, 0.05) !important;
    }
    .form-input:focus {
        background: rgba(255, 255, 255, 0.05) !important;
        border-color: var(--accent-primary) !important;
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
    }
</style>
{% endblock %}
