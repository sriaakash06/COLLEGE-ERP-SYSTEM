{% extends "base.html" %}

{% block title %}Add New Student - College ERP{% endblock %}

{% block content %}
<div class="container mt-5 pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="glass p-5 border-0">
                <div class="d-flex align-items-center justify-content-between mb-5">
                    <div>
                        <h2 class="mb-1"><i class="fas fa-user-plus me-3 text-primary"></i>Add New Student</h2>
                        <p class="text-muted mb-0">Enroll a new student into the academic system</p>
                    </div>
                    <a href="{{ url_for('students.students') }}" class="btn-premium" style="background: rgba(255,255,255,0.05); color: var(--text-muted); box-shadow: none;">
                        <i class="fas fa-arrow-left me-2"></i>Back to Fleet
                    </a>
                </div>

                <form method="POST">
                    <!-- Personal Information -->
                    <div class="form-section-title">
                        <i class="fas fa-user-circle"></i> Personal Information
                    </div>
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Full Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name" placeholder="John Doe" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email Address <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="john.doe@example.com" required>
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-4 mb-3">
                            <label for="password" class="form-label">Initial Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" name="phone" placeholder="+1 (555) 000-0000">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="date_of_birth" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="date_of_birth" name="date_of_birth">
                        </div>
                    </div>
                    
                    <div class="row mb-5">
                        <div class="col-md-4 mb-3">
                            <label for="gender" class="form-label">Gender</label>
                            <select class="form-select" id="gender" name="gender">
                                <option value="" selected disabled>Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="blood_group" class="form-label">Blood Group</label>
                            <select class="form-select" id="blood_group" name="blood_group">
                                <option value="" selected disabled>Select Group</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="admission_type" class="form-label">Admission Category</label>
                            <select class="form-select" id="admission_type" name="admission_type">
                                <option value="Regular">Regular</option>
                                <option value="Management">Management</option>
                                <option value="NRI">NRI</option>
                                <option value="Lateral">Lateral</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Academic Information -->
                    <div class="form-section-title">
                        <i class="fas fa-graduation-cap"></i> Academic Credentials
                    </div>
                    <div class="row mb-5">
                        <div class="col-md-4 mb-3">
                            <label for="reg_no" class="form-label">Registration No <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="reg_no" name="reg_no" placeholder="REG2024001" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="roll_no" class="form-label">Roll Number</label>
                            <input type="text" class="form-control" id="roll_no" name="roll_no" placeholder="ROLL-42">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="course_id" class="form-label">Assigned Program</label>
                            <select class="form-select" id="course_id" name="course_id">
                                <option value="" disabled selected>Select Program</option>
                                {% for course in courses %}
                                <option value="{{ course.id }}">{{ course.name }} - {{ course.department_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <!-- Family & Contact -->
                    <div class="form-section-title">
                        <i class="fas fa-users-cog"></i> Family & Contact Details
                    </div>
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3">
                            <label for="father_name" class="form-label">Father's Name</label>
                            <input type="text" class="form-control" id="father_name" name="father_name" placeholder="John Doe Sr.">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="mother_name" class="form-label">Mother's Name</label>
                            <input type="text" class="form-control" id="mother_name" name="mother_name" placeholder="Jane Doe">
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3">
                            <label for="parent_phone" class="form-label">Parent Primary Contact</label>
                            <input type="tel" class="form-control" id="parent_phone" name="parent_phone" placeholder="+1 (555) 001-0002">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="parent_email" class="form-label">Parent Email ID</label>
                            <input type="email" class="form-control" id="parent_email" name="parent_email" placeholder="parent.contact@example.com">
                        </div>
                    </div>
                    
                    <div class="row mb-5">
                        <div class="col-md-6 mb-3">
                            <label for="permanent_address" class="form-label">Permanent Residence</label>
                            <textarea class="form-control" id="permanent_address" name="permanent_address" placeholder="Residential address for official correspondence..."></textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="current_address" class="form-label">Current / Hostel Address</label>
                            <textarea class="form-control" id="current_address" name="current_address" placeholder="Current living address..."></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-5 pt-4 border-top border-white-5">
                        <button type="reset" class="btn-premium me-3" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); box-shadow: none;">
                            <i class="fas fa-undo me-2"></i>Reset Form
                        </button>
                        <button type="submit" class="btn-premium">
                            <i class="fas fa-save me-2"></i>Commit Student Record
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
